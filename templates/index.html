<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchCar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a1f2e, #232838);
      padding: 24px 32px;
      border-bottom: 1px solid #2a2f3e;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.6rem; color: #4fc3f7; font-weight: 700; letter-spacing: -0.5px; }
    header span { color: #546e7a; font-size: 0.9rem; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }

    .search-card {
      background: #1a1f2e;
      border: 1px solid #2a2f3e;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .search-card h2 { font-size: 1rem; color: #78909c; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.78rem; color: #78909c; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      background: #0f1117;
      border: 1px solid #2a2f3e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4fc3f7; }
    input::placeholder { color: #37474f; }

    .fontes { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .fonte-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .fonte-check input[type=checkbox] { accent-color: #4fc3f7; width: 15px; height: 15px; }
    .fonte-check span { font-size: 0.85rem; color: #b0bec5; }

    .btn-buscar {
      margin-top: 20px;
      background: linear-gradient(135deg, #0288d1, #4fc3f7);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-buscar:hover { opacity: 0.85; }
    .btn-buscar:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #78909c;
    }
    .stats-bar strong { color: #4fc3f7; }

    .resultados-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .car-card {
      background: #1a1f2e;
      border: 1px solid #2a2f3e;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
    }
    .car-card:hover { transform: translateY(-3px); border-color: #4fc3f7; }

    .car-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #0f1117;
    }
    .car-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #1a1f2e, #0f1117);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .car-body { padding: 14px 16px; }
    .car-titulo { font-size: 0.9rem; font-weight: 600; color: #cfd8dc; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .car-preco { font-size: 1.2rem; font-weight: 700; color: #4fc3f7; margin-bottom: 8px; }
    .car-info { display: flex; gap: 10px; font-size: 0.75rem; color: #546e7a; flex-wrap: wrap; }
    .car-info span { display: flex; align-items: center; gap: 4px; }

    .car-footer { padding: 10px 16px; border-top: 1px solid #2a2f3e; display: flex; justify-content: space-between; align-items: center; }
    .fonte-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .fonte-WebMotors { background: #1b3a5c; color: #4fc3f7; }
    .fonte-OLX { background: #3a2a0a; color: #ffb300; }
    .fonte-iCarros { background: #1b3a1b; color: #66bb6a; }
    .fonte-MercadoLivre { background: #1a2e1a; color: #a5d6a7; }

    .btn-ver {
      font-size: 0.78rem;
      color: #4fc3f7;
      text-decoration: none;
      font-weight: 600;
    }
    .btn-ver:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 60px; color: #546e7a; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2f3e;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .erro-msg { background: #2a1a1a; border: 1px solid #c62828; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #ef9a9a; }
    .empty-state { text-align: center; padding: 60px; color: #546e7a; }
  </style>
</head>
<body>
  <header>
    <h1>🚗 SearchCar</h1>
    <span>Busca de carros em múltiplos sites de revenda</span>
  </header>

  <div class="container">
    <div class="search-card">
      <h2>Filtros de Busca</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Marca</label>
          <input type="text" id="marca" placeholder="Ex: Toyota" />
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" id="modelo" placeholder="Ex: Corolla" />
        </div>
        <div class="form-group">
          <label>Ano mínimo</label>
          <input type="number" id="ano_min" placeholder="Ex: 2018" />
        </div>
        <div class="form-group">
          <label>Ano máximo</label>
          <input type="number" id="ano_max" placeholder="Ex: 2024" />
        </div>
        <div class="form-group">
          <label>Preço máximo (R$)</label>
          <input type="number" id="preco_max" placeholder="Ex: 80000" />
        </div>
      </div>

      <div class="form-group" style="margin-top: 20px;">
        <label>Fontes</label>
        <div class="fontes">
          <label class="fonte-check"><input type="checkbox" value="webmotors" checked /><span>WebMotors</span></label>
          <label class="fonte-check"><input type="checkbox" value="olx" checked /><span>OLX</span></label>
          <label class="fonte-check"><input type="checkbox" value="icarros" checked /><span>iCarros</span></label>
          <label class="fonte-check"><input type="checkbox" value="mercadolivre" checked /><span>MercadoLivre</span></label>
        </div>
      </div>

      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">Buscar Carros</button>
    </div>

    <div id="resultado-area"></div>
  </div>

  <script>
    async function buscar() {
      const marca = document.getElementById('marca').value;
      const modelo = document.getElementById('modelo').value;
      const ano_min = document.getElementById('ano_min').value;
      const ano_max = document.getElementById('ano_max').value;
      const preco_max = document.getElementById('preco_max').value;
      const checks = document.querySelectorAll('.fontes input:checked');
      const fontes = Array.from(checks).map(c => c.value).join(',');

      const btn = document.getElementById('btn-buscar');
      btn.disabled = true;
      btn.textContent = 'Buscando...';

      document.getElementById('resultado-area').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Buscando nos sites selecionados...</p>
        </div>`;

      const params = new URLSearchParams();
      if (marca) params.set('marca', marca);
      if (modelo) params.set('modelo', modelo);
      if (ano_min) params.set('ano_min', ano_min);
      if (ano_max) params.set('ano_max', ano_max);
      if (preco_max) params.set('preco_max', preco_max);
      params.set('fontes', fontes || 'webmotors,olx,icarros,mercadolivre');

      try {
        const resp = await fetch(`/buscar?${params.toString()}`);
        const data = await resp.json();
        renderResultados(data);
      } catch (e) {
        document.getElementById('resultado-area').innerHTML = `<div class="erro-msg">Erro ao buscar: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Buscar Carros';
      }
    }

    function renderResultados(data) {
      const { resultados, total, erros } = data;
      let html = '';

      if (erros && erros.length > 0) {
        erros.forEach(e => {
          html += `<div class="erro-msg">⚠️ ${e.fonte}: ${e.erro}</div>`;
        });
      }

      if (!resultados || resultados.length === 0) {
        html += `<div class="empty-state"><p>Nenhum resultado encontrado.</p></div>`;
        document.getElementById('resultado-area').innerHTML = html;
        return;
      }

      html += `<div class="stats-bar"><span>Total: <strong>${total}</strong> anúncios encontrados</span></div>`;
      html += `<div class="resultados-grid">`;

      resultados.forEach(car => {
        const preco = car.preco ? `R$ ${Number(car.preco).toLocaleString('pt-BR')}` : 'Consulte';
        const img = car.imagem
          ? `<img class="car-img" src="${car.imagem}" alt="${car.titulo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="car-img-placeholder" style="display:none">🚗</div>`
          : `<div class="car-img-placeholder">🚗</div>`;

        html += `
          <div class="car-card">
            ${img}
            <div class="car-body">
              <div class="car-titulo" title="${car.titulo}">${car.titulo}</div>
              <div class="car-preco">${preco}</div>
              <div class="car-info">
                ${car.km ? `<span>📍 ${Number(car.km).toLocaleString('pt-BR')} km</span>` : ''}
                ${car.cidade ? `<span>🏙 ${car.cidade}</span>` : ''}
                ${car.ano ? `<span>📅 ${car.ano}</span>` : ''}
              </div>
            </div>
            <div class="car-footer">
              <span class="fonte-badge fonte-${car.fonte}">${car.fonte}</span>
              <a class="btn-ver" href="${car.url}" target="_blank" rel="noopener">Ver anúncio →</a>
            </div>
          </div>`;
      });

      html += `</div>`;
      document.getElementById('resultado-area').innerHTML = html;
    }
  </script>
</body>
</html>
